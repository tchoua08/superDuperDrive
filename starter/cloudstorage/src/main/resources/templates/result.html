<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <link rel="stylesheet" type="text/css" media="all" th:href="@{/proxy/8080/css/bootstrap.min.css}">
        <link rel="stylesheet" type="text/css" media="all" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <title>Result</title>
    </head>
    <body class="p-3 mb-2 bg-light text-black">
        <div class="container justify-content-center w-50 p-3" style="margin-top: 5em;">
            <div th:if="${successMessage}" class="alert alert-success fill-parent">
                <h1 class="display-5" id="success">Success</h1>
                <span th:text="${successMessage}"></span>
                <span> Click <a th:href="@{/home}">here</a> to continue.</span>`
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger fill-parent">
                <h1 class="display-5">Error</h1>
                <span>Your changes were not saved. Click <a>here</a> to continue.</span>
            </div>
        </div>
    </body>
</html>

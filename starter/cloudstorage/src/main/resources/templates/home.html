<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Logout -->
    <div class="text-end mb-3">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-secondary">Logout</button>
        </form>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#files">Files</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#notes">Notes</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#credentials">Credentials</button>
        </li>
    </ul>

    <div class="tab-content mt-4">

        <!-- ================= FILES ================= -->
        <div class="tab-pane fade show active" id="files">

            <form th:action="@{/files}" method="post" enctype="multipart/form-data" class="mb-3">
                <input type="file" name="fileUpload" required>
                <button class="btn btn-dark">Upload</button>
            </form>

            <table class="table">
                <thead>
                <tr>
                    <th>Actions</th>
                    <th>File Name</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(files)}">
                    <td colspan="2">No files</td>
                </tr>
                <tr th:each="file : ${files}">
                    <td>
                        <a th:href="@{/files/view/{id}(id=${file.fileId})}" class="btn btn-success btn-sm">View</a>
                        <a th:href="@{/files/delete/{id}(id=${file.fileId})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                    <td th:text="${file.fileName}"></td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- ================= NOTES ================= -->
        <div class="tab-pane fade" id="notes">

            <button class="btn btn-info mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#noteModal"
                    onclick="openNewNoteModal()">
                + Add Note
            </button>

            <table class="table">
                <thead>
                <tr>
                    <th>Actions</th>
                    <th>Title</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(notes)}">
                    <td colspan="3">No notes</td>
                </tr>
                <tr th:each="note : ${notes}">
                    <td>
                        <button class="btn btn-success btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#noteModal"
                                th:attr="data-noteid=${note.noteId},
                                         data-title=${note.noteTitle},
                                         data-description=${note.noteDescription}"
                                onclick="openEditNoteModal(this)">
                            Edit
                        </button>

                        <a th:href="@{/notes/delete/{id}(id=${note.noteId})}"
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                    <td th:text="${note.noteTitle}"></td>
                    <td th:text="${note.noteDescription}"></td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- ================= CREDENTIALS ================= -->
        <div class="tab-pane fade" id="credentials" role="tabpanel">
            <button type="button" class="btn btn-primary" onclick="showCredentialModal()">
                Add a New Credential
            </button>

            <table class="table">
                <thead>
                <tr>
                    <th>URL</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="credential : ${credentials}">
                    <td th:text="${credential.url}"></td>
                    <td th:text="${credential.username}"></td>
                    <td th:text="${credential.password}"></td>
                    <td>
                        <button type="button"
                                class="btn btn-success btn-sm"
                                th:attr="data-id=${credential.credentialId},
                                     data-url=${credential.url},
                                     data-username=${credential.username},
                                     data-password=${credential.decryptedPassword}"
                                onclick="editCredential(this)">
                            Edit
                        </button>

                        <a th:href="@{/credential/delete/{id}(id=${credential.credentialId})}"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>


    </div>
</div>

<!-- ================= NOTE MODAL ================= -->
<div class="modal fade" id="noteModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/notes}" th:object="${noteForm}" method="post">
                <div class="modal-body">

                    <input type="hidden" th:field="*{noteId}" id="note-id">

                    <input class="form-control mb-2" th:field="*{noteTitle}" id="note-title" placeholder="Title">
                    <textarea class="form-control" th:field="*{noteDescription}" id="note-description"></textarea>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ================= CREDENTIAL MODAL ================= -->
<div class="modal fade" id="credentialModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Credential</h5>
            </div>
            <div class="modal-body">
                <form th:action="@{/credential}" th:object="${credentialForm}" method="post">
                    <input type="hidden" th:field="*{credentialId}" id="credential-id">

                    <div class="form-group">
                        <label for="credential-url">URL</label>
                        <input type="text" class="form-control" th:field="*{url}" id="credential-url">
                    </div>

                    <div class="form-group">
                        <label for="credential-username">Username</label>
                        <input type="text" class="form-control" th:field="*{username}" id="credential-username">
                    </div>

                    <div class="form-group">
                        <label for="credential-password">Password</label>
                        <input type="text" class="form-control" th:field="*{password}" id="credential-password">
                    </div>

                    <button type="submit" class="btn btn-primary">Save changes</button>
                </form>
            </div>
        </div>
    </div>
</div>


<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function openNewNoteModal() {
        document.getElementById('note-id').value = '';
        document.getElementById('note-title').value = '';
        document.getElementById('note-description').value = '';
    }

    function openEditNoteModal(btn) {
        document.getElementById('note-id').value = btn.getAttribute('data-noteid');
        document.getElementById('note-title').value = btn.getAttribute('data-title');
        document.getElementById('note-description').value = btn.getAttribute('data-description');
    }

<script>
function showCredentialModal() {
    document.getElementById("credential-id").value = "";
    document.getElementById("credential-url").value = "";
    document.getElementById("credential-username").value = "";
    document.getElementById("credential-password").value = "";
    $('#credentialModal').modal('show');
}

function editCredential(button) {
    document.getElementById("credential-id").value = button.getAttribute("data-id");
    document.getElementById("credential-url").value = button.getAttribute("data-url");
    document.getElementById("credential-username").value = button.getAttribute("data-username");
    document.getElementById("credential-password").value = button.getAttribute("data-password");
    $('#credentialModal').modal('show');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Logout -->
    <div class="text-end mb-3">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-secondary">Logout</button>
        </form>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#files">Files</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#notes">Notes</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#credentials">Credentials</button>
        </li>
    </ul>

    <div class="tab-content mt-4">

        <!-- ================= FILES ================= -->
        <div class="tab-pane fade show active" id="files">

            <form th:action="@{/files}" method="post" enctype="multipart/form-data" class="mb-3">
                <input type="file" name="fileUpload" required>
                <button class="btn btn-dark">Upload</button>
            </form>

            <table class="table">
                <thead>
                <tr>
                    <th>Actions</th>
                    <th>File Name</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(files)}">
                    <td colspan="2">No files</td>
                </tr>
                <tr th:each="file : ${files}">
                    <td>
                        <a th:href="@{/files/view/{id}(id=${file.fileId})}" class="btn btn-success btn-sm">View</a>
                        <a th:href="@{/files/delete/{id}(id=${file.fileId})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                    <td th:text="${file.fileName}"></td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- ================= NOTES ================= -->
        <div class="tab-pane fade" id="notes">

            <button class="btn btn-info mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#noteModal"
                    onclick="openNewNoteModal()">
                + Add Note
            </button>

            <table class="table">
                <thead>
                <tr>
                    <th>Actions</th>
                    <th>Title</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(notes)}">
                    <td colspan="3">No notes</td>
                </tr>
                <tr th:each="note : ${notes}">
                    <td>
                        <button class="btn btn-success btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#noteModal"
                                th:attr="data-noteid=${note.noteId},
                                         data-title=${note.noteTitle},
                                         data-description=${note.noteDescription}"
                                onclick="openEditNoteModal(this)">
                            Edit
                        </button>

                        <a th:href="@{/notes/delete/{id}(id=${note.noteId})}"
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                    <td th:text="${note.noteTitle}"></td>
                    <td th:text="${note.noteDescription}"></td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- ================= CREDENTIALS ================= -->
        <div class="tab-pane fade" id="credentials">

            <button class="btn btn-info mb-3"
                    data-bs-toggle="modal"
                    data-bs-target="#credentialModal"
                    onclick="openNewCredentialModal()">
                + Add Credential
            </button>

            <table class="table">
                <thead>
                <tr>
                    <th>Actions</th>
                    <th>URL</th>
                    <th>User Name</th>
                    <th>Password</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(credentials)}">
                    <td colspan="4">No credentials</td>
                </tr>
                <tr th:each="cred : ${credentials}">
                    <td>
                        <button class="btn btn-success btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#credentialModal"
                                th:attr="data-id=${cred.credentialId},
                                         data-url=${cred.url},
                                         data-userName=${cred.userName},
                                         data-password=${cred.password}"
                                onclick="openEditCredentialModal(this)">
                            Edit
                        </button>

                        <a th:href="@{/credentials/delete(credentialId=${cred.credentialId})}"
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                    <td th:text="${cred.url}"></td>
                    <td th:text="${cred.userName}"></td>
                    <td th:text="${cred.password}"></td>
                </tr>
                </tbody>
            </table>

        </div>

    </div>
</div>

<!-- ================= NOTE MODAL ================= -->
<div class="modal fade" id="noteModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/notes}" th:object="${noteForm}" method="post">
                <div class="modal-body">

                    <input type="hidden" th:field="*{noteId}" id="note-id">

                    <input class="form-control mb-2" th:field="*{noteTitle}" id="note-title" placeholder="Title">
                    <textarea class="form-control" th:field="*{noteDescription}" id="note-description"></textarea>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ================= CREDENTIAL MODAL ================= -->
<div class="modal fade" id="credentialModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/credentials}" th:object="${credentialForm}" method="post">
                <div class="modal-body">

                    <input type="hidden" th:field="*{credentialId}" id="cred-id">

                    <input class="form-control mb-2" th:field="*{url}" id="cred-url" placeholder="URL">
                    <input class="form-control mb-2" th:field="*{userName}" id="cred-userName" placeholder="User Name">
                    <input class="form-control" th:field="*{password}" id="cred-password" placeholder="Password">

                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function openNewNoteModal() {
        document.getElementById('note-id').value = '';
        document.getElementById('note-title').value = '';
        document.getElementById('note-description').value = '';
    }

    function openEditNoteModal(btn) {
        document.getElementById('note-id').value = btn.getAttribute('data-noteid');
        document.getElementById('note-title').value = btn.getAttribute('data-title');
        document.getElementById('note-description').value = btn.getAttribute('data-description');
    }

    function openNewCredentialModal() {
        document.getElementById('cred-id').value = '';
        document.getElementById('cred-url').value = '';
        document.getElementById('cred-userName').value = '';
        document.getElementById('cred-password').value = '';
    }

    function openEditCredentialModal(btn) {
        document.getElementById('cred-id').value = btn.getAttribute('data-id');
        document.getElementById('cred-url').value = btn.getAttribute('data-url');
        document.getElementById('cred-userName').value = btn.getAttribute('data-userName');
        document.getElementById('cred-password').value = btn.getAttribute('data-password');
    }
</script>

</body>
</html>

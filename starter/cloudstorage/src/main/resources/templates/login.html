<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h1>Login</h1>

            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group mb-3">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" class="form-control" placeholder="Enter Username" required>
                </div>

                <div class="form-group mb-3">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" class="form-control" placeholder="Enter Password" required>
                </div>

                <button class="btn btn-primary" type="submit">Login</button>
            </form>

            <a class="mt-3 d-inline-block" th:href="@{/signup}">Click here to sign up</a>
        </div>
    </div>
</div>

</body>
</html>

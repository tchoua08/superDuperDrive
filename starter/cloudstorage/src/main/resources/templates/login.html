<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/proxy/8080/css/bootstrap.min.css}">
    <link rel="stylesheet" type="text/css" media="all" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <title>Result</title>
</head>
<body class="p-3 mb-2 bg-light text-black container mt-5">

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h1>Login</h1>
            <div th:if="${successMessage}" class="alert alert-success fill-parent">
                <h1 class="display-5" id="success">Success</h1>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger fill-parent">
                <h1 class="display-5">Error</h1>
            </div>
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out
            </div>

            <!-- Messages -->
            <form th:action="@{/login}" method="post">
                <div class="form-group mb-3">
                    <label for="inputUsername">Username</label>
                    <input id="inputUsername" type="text" name="username" class="form-control" placeholder="Enter Username" required>
                </div>

                <div class="form-group mb-3">
                    <label for="inputPassword">Password</label>
                    <input id="inputPassword" type="password" name="password" class="form-control" placeholder="Enter Password" required>
                </div>

                <button class="btn btn-primary" type="submit" id="login-button">Login</button>
            </form>

            <a class="mt-3 d-inline-block" th:href="@{/signup}">Click here to sign up</a>
        </div>
    </div>
</div>

</body>
</html>

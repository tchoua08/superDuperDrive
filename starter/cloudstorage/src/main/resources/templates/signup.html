<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-3 mb-2 bg-light text-black">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4 shadow-sm">

                <!-- back -->
                <div class="mb-3">
                    <a th:href="@{/login}">Back to Login</a>
                </div>

                <h2 class="mb-4">Sign Up</h2>
                  <!-- Form -->
                <form th:action="@{/signup}" th:object="${signupForm}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="inputFirstName">First Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{firstName}"
                                   placeholder="Enter First Name"
                                   id="inputFirstName"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="inputLastName">Last Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{lastName}"
                                   placeholder="Enter Last Name"
                                   id="inputLastName"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="inputUsername">User Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{userName}"
                                   placeholder="Enter User name"
                                   id="inputUsername"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="inputPassword">Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   placeholder="Enter Password"
                                   id="inputPassword"
                                   required>
                        </div>

                    </div>
                    <button type="submit" class="btn btn-primary" id="buttonSignUp">Sign Up</button>

                </form>

            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
